server.port=${SERVER_PORT:8080}
spring.application.name=apigateway

# Gateway Routes (unchanged - logical names only)
spring.cloud.gateway.server.webmvc.routes[0].id=demographics-patients
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://demographics
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/patients/**

spring.cloud.gateway.server.webmvc.routes[1].id=notes
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://notes
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/notes/**

spring.cloud.gateway.server.webmvc.routes[2].id=frontend-ui
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://frontend-service
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/, /login, /static/**

spring.cloud.gateway.server.webmvc.routes[3].id=assessment
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://assessment
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/assess/**

# Load Balancer - now parameterized
spring.cloud.discovery.client.simple.instances.demographics[0].uri=${DEMOGRAPHICS_URI:http://localhost:8081}
spring.cloud.discovery.client.simple.instances.notes[0].uri=${NOTES_URI:http://localhost:8082}
spring.cloud.discovery.client.simple.instances.frontend-service[0].uri=${FRONTEND_URI:http://localhost:5000}
spring.cloud.discovery.client.simple.instances.assessment[0].uri=${ASSESSMENT_URI:http://localhost:8083}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}

