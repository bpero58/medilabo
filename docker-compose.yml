version: "3.8"

services:
  springboot-app:
    build:
      context: ./springboot-app
    container_name: springboot-app
    ports:
      - "8080:8080"
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  flask-ui:
    build:
      context: ./flask-ui
    container_name: flask-ui
    ports:
      - "5000:5000"
    environment:
      - SPRINGBOOT_URL=http://springboot-app:8080
    depends_on:
      springboot-app:
        condition: service_healthy
    networks:
      - appnet

networks:
  appnet:
    driver: bridge