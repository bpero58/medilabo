<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MediLabo — Sign In</title>
  <style>
    /* ── Reset & Tokens ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-dark:  #1e3a5f;
      --blue:       #2563eb;
      --blue-light: #eff6ff;
      --green:      #16a34a;
      --red:        #dc2626;
      --gray-50:    #f9fafb;
      --gray-100:   #f3f4f6;
      --gray-200:   #e5e7eb;
      --gray-400:   #9ca3af;
      --gray-600:   #4b5563;
      --gray-800:   #1f2937;
      --white:      #ffffff;
      --radius:     8px;
      --shadow:     0 1px 3px rgba(0,0,0,.12), 0 1px 2px rgba(0,0,0,.08);
      --shadow-lg:  0 10px 25px rgba(0,0,0,.15);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--gray-100);
      color: var(--gray-800);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────── */
    header {
      background: var(--blue-dark);
      color: var(--white);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: var(--shadow);
    }

    header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: .3px; }
    header span { font-size: .8rem; opacity: .6; margin-left: 4px; }

    /* ── Login Stage ─────────────────────────────────── */
    .login-stage {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .login-card {
      background: var(--white);
      border-radius: 12px;
      box-shadow: var(--shadow-lg);
      padding: 2.4rem 2.2rem;
      width: 100%;
      max-width: 420px;
      animation: pop .25s ease;
    }

    @keyframes pop {
      from { transform: scale(.94); opacity: 0; }
      to   { transform: scale(1);  opacity: 1; }
    }

    .login-icon {
      width: 56px;
      height: 56px;
      background: var(--blue-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.2rem;
    }

    .login-card h2 {
      text-align: center;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--blue-dark);
      margin-bottom: .3rem;
    }

    .login-card p.subtitle {
      text-align: center;
      font-size: .88rem;
      color: var(--gray-400);
      margin-bottom: 1.8rem;
    }

    /* ── Form ────────────────────────────────────────── */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 1rem;
    }

    label {
      font-size: .8rem;
      font-weight: 600;
      color: var(--gray-600);
      text-transform: uppercase;
      letter-spacing: .4px;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 11px;
      color: var(--gray-400);
      pointer-events: none;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px 12px 10px 36px;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      font-size: .93rem;
      background: var(--gray-50);
      outline: none;
      transition: border-color .2s, background .2s;
      font-family: inherit;
    }

    input:focus {
      border-color: var(--blue);
      background: var(--white);
    }

    /* Toggle password visibility */
    .toggle-pw {
      position: absolute;
      right: 11px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--gray-400);
      font-size: 1rem;
      padding: 0;
      line-height: 1;
    }
    .toggle-pw:hover { color: var(--gray-800); }

    /* Remember me */
    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 1.4rem;
      font-size: .88rem;
      color: var(--gray-600);
      cursor: pointer;
    }
    .remember input { width: auto; padding: 0; }

    /* Error banner */
    .error-banner {
      display: none;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: .88rem;
      color: var(--red);
      margin-bottom: 1rem;
      gap: 8px;
      align-items: flex-start;
    }
    .error-banner.visible { display: flex; }

    /* Submit button */
    .btn-login {
      width: 100%;
      padding: 11px;
      background: var(--blue);
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity .15s, transform .1s;
    }
    .btn-login:hover   { opacity: .88; }
    .btn-login:active  { transform: scale(.98); }
    .btn-login:disabled { opacity: .55; cursor: not-allowed; }

    /* Spinner */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: var(--white);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer hint */
    .login-footer {
      text-align: center;
      margin-top: 1.4rem;
      font-size: .8rem;
      color: var(--gray-400);
    }

    .token-info {
      margin-top: 1rem;
      padding: 10px 14px;
      background: var(--blue-light);
      border-radius: var(--radius);
      font-size: .82rem;
      color: var(--blue-dark);
      text-align: center;
    }
  </style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────── -->
<header>
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
       stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
  </svg>
  <h1>MediLabo <span>Patient Demographics</span></h1>
</header>

<!-- ── Login Card ─────────────────────────────────────── -->
<div class="login-stage">
  <div class="login-card">

    <!-- Icon -->
    <div class="login-icon">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none"
           stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>

    <h2>Sign In</h2>
    <p class="subtitle">Enter your credentials to access the portal</p>

    <!-- Error Banner -->
    <div class="error-banner" id="errorBanner" role="alert">
      <span>⚠️</span>
      <span id="errorMsg">Invalid username or password.</span>
    </div>

    <!-- Form -->
    <form id="loginForm" onsubmit="handleLogin(event)" novalidate>

      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </span>
          <input id="username" type="text"
                 placeholder="Enter your username"
                 autocomplete="username"
                 required />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input id="password" type="password"
                 placeholder="Enter your password"
                 autocomplete="current-password"
                 required />
          <button type="button" class="toggle-pw" onclick="togglePassword()" title="Show/hide password">
            👁
          </button>
        </div>
      </div>

      <label class="remember">
        <input type="checkbox" id="rememberMe" />
        Keep me signed in for 8 hours
      </label>

      <button type="submit" class="btn-login" id="loginBtn">
        <div class="spinner" id="spinner"></div>
        <span id="loginBtnText">Sign In</span>
      </button>

    </form>

    <div class="token-info">
      🔐 Sessions are secured with a signed JWT token (HS256)
    </div>

    <p class="login-footer">
      MediLabo v1.0 &mdash; Authorized personnel only
    </p>
  </div>
</div>

<script>
  // Redirect if already logged in
(function checkExistingToken() {
  const token = sessionStorage.getItem('ml_token') || localStorage.getItem('ml_token');
  if (token) {
    window.location.href = '/';
  }
})();

// ── Toggle password visibility ──────────────────────
function togglePassword() {
  const pw = document.getElementById('password');
  pw.type = pw.type === 'password' ? 'text' : 'password';
}

// ── Handle Login ────────────────────────────────────
async function handleLogin(e) {
  e.preventDefault();
  setLoading(true);
  hideError();

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const remember = document.getElementById('rememberMe').checked;
//Direct UI login to apigateway on port 8080
  try {
    const res = await fetch('http://localhost:8080/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });

    const data = await res.json();

    if (!res.ok) {
      showError(data.error || 'Login failed. Please try again.');
      return;
    }

    const storage = remember ? localStorage : sessionStorage;
    storage.setItem('ml_token',    data.token);
    storage.setItem('ml_username', data.username);
    storage.setItem('ml_role',     data.role);

    window.location.href = '/';

  } catch (err) {
    showError('Could not reach the server. Please check your connection.');
  } finally {
    setLoading(false);
  }
}

// ── UI Helpers ──────────────────────────────────────
function setLoading(on) {
  const btn = document.getElementById('loginBtn');
  const spinner = document.getElementById('spinner');
  const text = document.getElementById('loginBtnText');
  btn.disabled = on;
  spinner.style.display = on ? 'block' : 'none';
  text.textContent = on ? 'Signing in…' : 'Sign In';
}

function showError(msg) {
  document.getElementById('errorMsg').textContent = msg;
  document.getElementById('errorBanner').classList.add('visible');
}

function hideError() {
  document.getElementById('errorBanner').classList.remove('visible');
}
</script>
</body>
</html>
